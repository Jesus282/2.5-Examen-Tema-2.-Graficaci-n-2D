<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Beat Idol</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

<div class="container-fluid vh-100 overflow-hidden">
  <div class="row h-100">

    <!-- 🌑 SIDEBAR -->
    <div class="col-md-3 sidebar d-flex flex-column p-4">

      <h2 class="title">🎵 Dual Beat Idol</h2>
      <p class="subtitle">✨ Shadow Rhythm</p>

      <!-- 🎴 SELECTOR CON CARDS -->
      <label class="mt-3">Selecciona canción</label>

      <div class="song-grid mt-3">

        <div class="song-card active" data-song="tutorial">
          <img src="./assets/img/tutorial.png">
          <div class="overlay">Tutorial</div>
        </div>

        <div class="song-card" data-song="song1">
          <img src="./assets/img/song1.jpg">
          <div class="overlay">Song 1</div>
        </div>

        <div class="song-card" data-song="song2">
          <img src="./assets/img/song2.jpg">
          <div class="overlay">Song 2</div>
        </div>

        <div class="song-card" data-song="song3">
          <img src="./assets/img/song3.jpg">
          <div class="overlay">Song 3</div>
        </div>

      </div>

      <!-- 🔒 SELECT OCULTO (NO TOCAR) -->
      <select id="songSelector" hidden>
        <option value="tutorial">Tutorial</option>
        <option value="song1">Song 1</option>
        <option value="song2">Song 2</option>
        <option value="song3">Song 3</option>
      </select>

      <!-- 📜 INSTRUCCIONES -->
      <div class="instructions mt-4">
        <h5>🎮 Controles</h5>
        <ul>
          <li>F = ⬅️ izquierda</li>
          <li>J = ➡️ derecha</li>
          <li>F + J = 💎 doble</li>
          <li>Mantén para notas largas ✨</li>
        </ul>
        <p class="text-muted">Haz combos para obtener más puntos 🔥</p>
      </div>

      <!-- 🔘 BOTÓN -->
      <div class="mt-auto">
        <button id="startBtn" class="btn start-btn w-100">
            Iniciar
        </button>
      </div>

    </div>

    <!-- 🎮 GAME AREA -->
    <div class="col-md-9 d-flex justify-content-center align-items-center">
      <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

  </div>
</div>

<script type="module" src="./assets/js/main.js"></script>

</body>
</html>
