<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Beat Idol</title>

    <!-- Bootstrap (opcional, ya no dependes del grid) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-icon">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

<!-- 🎵 BOTÓN MENÚ (MÓVIL) -->
<button id="menuToggle" class="menu-btn">🎵 Canciones</button>

<!-- 🧱 CONTENEDOR PRINCIPAL -->
<div class="main-container">

    <!-- 🌑 SIDEBAR -->
    <aside id="sidebar" class="sidebar d-flex flex-column p-4">

        <h2 class="title">🎵 Dual Beat</h2>
        <p class="subtitle">✨ Shadow Rhythm</p>

        <!-- 🎴 SELECTOR -->
        <label class="mt-3">Selecciona canción</label>

        <div class="song-grid mt-3">

            <div class="song-card active" data-song="tutorial">
                <img src="./assets/img/tutorial.png">
                <div class="overlay">Tutorial</div>
            </div>

            <div class="song-card" data-song="song1">
                <img src="./assets/img/song1.jpg">
                <div class="overlay">Operation Dokotoban</div>
            </div>

            <div class="song-card" data-song="song2">
                <img src="./assets/img/song2.jpg">
                <div class="overlay">Azalea</div>
            </div>

            <div class="song-card" data-song="song3">
                <img src="./assets/img/song3.jpg">
                <div class="overlay">Detective light up</div>
            </div>

            <div class="song-card" data-song="song4">
                <img src="./assets/img/song4.jpg">
                <div class="overlay">ID Smile</div>
            </div>

            <div class="song-card" data-song="song5">
                <img src="./assets/img/song5.png">
                <div class="overlay">Start Dash</div>
            </div>

        </div>

        <!-- 🔒 SELECT OCULTO -->
        <select id="songSelector" hidden>
            <option value="tutorial">Tutorial</option>
            <option value="song1">Azalea</option>
            <option value="song2">Song 2</option>
            <option value="song3">Detective light up</option>
            <option value="song4">ID Smile</option>
            <option value="song5">Start Dash</option>
        </select>

        <!-- 📜 INSTRUCCIONES -->
        <div class="instructions mt-4">
            <h5>🎮 Controles</h5>
            <ul>
                <li>F = ⬅️ izquierda</li>
                <li>J = ➡️ derecha</li>
                <li>F + J = 💎 doble</li>
                <li>Mantén para notas largas ✨</li>
            </ul>
            <p class="text-muted">Haz combos para obtener más puntos 🔥</p>
        </div>

        <!-- 🔘 BOTÓN -->
        <div class="mt-auto">
            <button id="startBtn" class="btn start-btn w-100">
                Iniciar
            </button>
        </div>

    </aside>

    <!-- 🎮 GAME AREA -->
    <main class="game-container">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </main>

</div>

<script type="module" src="./assets/js/main.js"></script>

</body>
</html>
